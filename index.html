<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayşe için...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        #ui {
            position: relative;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        /* Dönen "I Love You" yazıları */
        .love_word {
            color: #ea80b0;
            font-size: 1.2rem;
            position: absolute;
            transform: translateY(-100%) rotateZ(-30deg);
            text-shadow: 0 0 8px #fff;
            letter-spacing: 2px;
            white-space: nowrap;
            user-select: none;
            opacity: 0.6;
        }

        .love_horizontal {
            position: absolute;
            transform-style: preserve-3d;
            animation: horizontal 10000ms infinite alternate ease-in-out;
            animation-delay: calc(var(--i) * -300ms);
        }

        /* Ortadaki Sabit Not */
        .message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 280px;
            z-index: 100;
            color: #fff;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(234, 128, 176, 0.3);
            box-shadow: 0 0 20px rgba(234, 128, 176, 0.2);
        }

        .message-box h2 {
            color: #ea80b0;
            margin-bottom: 10px;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .message-box p {
            line-height: 1.6;
            font-size: 0.95rem;
            font-style: italic;
            margin: 0;
        }

        @keyframes horizontal {
            0% { transform: rotateY(0deg) translateZ(180px); }
            100% { transform: rotateY(360deg) translateZ(180px); }
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="message-box">
            <h2>Ayşe'ye...</h2>
            <p>
                Bazen kırgınlıklar kelimelerin önüne geçiyor ama kalbimdeki yerini hiç değiştirmiyor. Ne kadar kırılırsam kırılayım, bu döngünün merkezi hep sensin. Seni her şeye rağmen çok seviyorum.
            </p>
        </div>
    </div>

    <script>
        const ui = document.getElementById('ui');
        const totalWords = 45; 

        for (let i = 0; i < totalWords; i++) {
            const container = document.createElement('div');
            container.className = 'love_horizontal';
            container.style.setProperty('--i', i);

            const word = document.createElement('div');
            word.className = 'love_word';
            word.innerText = 'I love you';

            const angle = (i / totalWords) * Math.PI * 2;
            
            // Kalp Formülü
            const x = 16 * Math.pow(Math.sin(angle), 3);
            const y = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
            
            const scale = 18; 
            word.style.left = `${x * scale}px`;
            word.style.top = `${y * scale}px`;

            container.appendChild(word);
            ui.appendChild(container);
        }
    </script>
</body>
</html>

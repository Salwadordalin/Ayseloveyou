<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Wizard - Heart Animation</title>
    <style>
        /* Genel sayfa düzeni */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        /* Ana kapsayıcı */
        #ui {
            position: relative;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        /* Görseldeki .love_word sınıfı */
        .love_word {
            color: #ea80b0;
            font-size: 1.4rem;
            position: absolute;
            /* Görseldeki orijinal transform */
            transform: translateY(-100%) rotateZ(-30deg);
            text-shadow: 0 0 10px #fff;
            letter-spacing: 2px;
            white-space: nowrap;
            user-select: none;
        }

        /* Görseldeki .love_horizontal sınıfı */
        .love_horizontal {
            position: absolute;
            transform-style: preserve-3d;
            /* Görseldeki animasyon tanımı */
            animation: horizontal 10000ms infinite alternate ease-in-out;
            animation-delay: calc(var(--i) * -300ms);
        }

        /* Kalp formunu veren ve döndüren animasyon */
        @keyframes horizontal {
            0% {
                transform: rotateY(0deg) translateZ(150px);
            }
            100% {
                transform: rotateY(360deg) translateZ(150px);
            }
        }
    </style>
</head>
<body>

    <div id="ui"></div>

    <script>
        const ui = document.getElementById('ui');
        const totalWords = 40; // Kalp yoğunluğunu buradan ayarlayabilirsin

        for (let i = 0; i < totalWords; i++) {
            // Animasyon gecikmesi için kapsayıcı
            const container = document.createElement('div');
            container.className = 'love_horizontal';
            container.style.setProperty('--i', i);

            // Kelime elementini oluştur
            const word = document.createElement('div');
            word.className = 'love_word';
            word.innerText = 'I love you';

            // Matematiksel kalp formülü (Kelimeleri kalp şeklinde dizmek için)
            const angle = (i / totalWords) * Math.PI * 2;
            
            // Parametrik Kalp Denklemi
            const x = 16 * Math.pow(Math.sin(angle), 3);
            const y = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
            
            const scale = 15; // Kalbin büyüklüğü
            word.style.left = `${x * scale}px`;
            word.style.top = `${y * scale}px`;

            container.appendChild(word);
            ui.appendChild(container);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayşe için Özel</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1000px; /* 3D derinlik için şart */
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        #ui {
            position: relative;
            width: 0;
            height: 0;
            transform-style: preserve-3d;
            transform: rotateY(0deg) rotateX(10deg);
            animation: rotateScene 15s infinite linear;
        }

        @keyframes rotateScene {
            from { transform: rotateY(0deg) rotateX(10deg); }
            to { transform: rotateY(360deg) rotateX(10deg); }
        }

        .love_word {
            position: absolute;
            color: #ea80b0;
            font-size: 1.2rem;
            white-space: nowrap;
            text-shadow: 0 0 10px #ea80b0;
            /* Videodaki o özel transform yapısı */
            transform: var(--transform-custom);
            animation: horizontal 10000ms infinite alternate ease-in-out;
            animation-delay: var(--delay);
        }

        @keyframes horizontal {
            0% { transform: var(--transform-custom) translateX(-50px); }
            100% { transform: var(--transform-custom) translateX(50px); }
        }

        .ayse-notu {
            position: absolute;
            bottom: 10%;
            color: #fff;
            text-align: center;
            z-index: 100;
            max-width: 80%;
            animation: fadeIn 5s ease-in;
        }

        .ayse-notu h1 { color: #ea80b0; margin-bottom: 10px; font-size: 1.5rem; }
        .ayse-notu p { font-style: italic; opacity: 0.8; line-height: 1.4; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="ui">
    <script>
        const ui = document.getElementById('ui');
        const totalWords = 30;
        for (let i = 0; i < totalWords; i++) {
            const div = document.createElement('div');
            div.className = 'love_word';
            // Her kelimeyi dairesel ve dikey bir açıyla döndürerek kalp formu veriyoruz
            const angle = (i / totalWords) * 360;
            const transform = `rotateY(${angle}deg) translateY(${Math.sin(i) * 100}px) translateZ(150px) rotateZ(-30deg)`;
            
            div.style.setProperty('--transform-custom', transform);
            div.style.setProperty('--delay', `${i * -300}ms`);
            div.innerText = 'i love you';
            ui.appendChild(div);
        }
    </script>
</div>

<div class="ayse-notu">
    <h1>Ayşe...</h1>
    <p>
        Sana olan kırgınlığım içimde sessizce dursa da, bu ne seni sevmeme engel ne de senden vazgeçmeme... 
        Kalbim hala deliler gibi senin için çarpıyor. Seni hala çok seviyorum.
    </p>
</div>

</body>
</html>

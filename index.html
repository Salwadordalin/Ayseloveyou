<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiseCephe - Özel Tasarım</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Video'daki Kalp Animasyonu İçin Kapsayıcı */
        #ui {
            margin-top: 50px;
            text-align: center;
        }

        .love_word {
            color: #ea80b0;
            font-size: 1.4rem;
            transform: translateY(-100%) rotateZ(-30deg);
            text-shadow: 0 0 10px #fff;
            letter-spacing: 2px;
            white-space: nowrap;
            display: block; /* Animasyonun görünmesi için */
        }

        .love_horizontal {
            animation: horizontal 10000ms infinite alternate ease-in-out;
            animation-delay: calc(var(--i) * -300ms);
        }

        @keyframes horizontal {
            from { transform: translateX(-20px); }
            to { transform: translateX(20px); }
        }

        /* Not Bölümü Stili */
        .note-container {
            margin-top: 100px;
            padding: 20px;
            border: 1px dashed #ea80b0;
            background: rgba(234, 128, 176, 0.1);
            border-radius: 10px;
            max-width: 80%;
            text-align: center;
        }

        .note-title {
            color: #ea80b0;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .note-content {
            font-style: italic;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="love_horizontal" style="--i: 1;">
            <span class="love_word">I love you</span>
        </div>
        <div class="love_horizontal" style="--i: 2;">
            <span class="love_word">I love you</span>
        </div>
        </div>

    <div class="note-container">
        <div class="note-title">Hatırlatıcı Not</div>
        <div class="note-content">
            "Gerızekalı vıdeodakının aynısını yap notu sabıt tut bu kadar aq"
        </div>
    </div>

</body>
</html>

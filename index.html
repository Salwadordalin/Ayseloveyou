<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayşe için Özel</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1000px; /* 3D derinlik için şart */
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        #ui {
            position: relative;
            width: 0;
            height: 0;
            transform-style: preserve-3d;
            transform: rotateY(0deg) rotateX(10deg);
            animation: rotateScene 15s infinite linear;
        }

        @keyframes rotateScene {
            from { transform: rotateY(0deg) rotateX(10deg); }
            to { transform: rotateY(360deg) rotateX(10deg); }
        }

        .love_word {
            position: absolute;
            color: #ea80b0;
            font-size: 1.2rem;
            white-space: nowrap;
            text-shadow: 0 0 10px #ea80b0;
            /* Videodaki o özel transform yapısı */
            transform: var(--transform-custom);
            animation: horizontal 10000ms infinite alternate ease-in-out;
            animation-delay: var(--delay);
        }

        @keyframes horizontal {
            0% { transform: var(--transform-custom) translateX(-50px); }
            100% { transform: var(--transform-custom) translateX(50px); }
        }

        .ayse-notu {
            position: absolute;
            bottom: 10%;
            color: #fff;
            text-align: center;
            z-index: 100;
            max-width: 80%;
            animation: fadeIn 5s ease-in;
        }

        .ayse-notu h1 { color: #ea80b0; margin-bottom: 10px; font-size: 1.5rem; }
        .ayse-notu p { font-style: italic; opacity: 0.8; line-height: 1.4; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
